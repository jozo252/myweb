{% extends 'base.html' %}

{% block title %}{{ post.title }} - Casual Flask App{% endblock %}

{% block content %}
  <article>
    <h1>{{ post.title }}</h1>
    <p class="text-muted">Published {{ post.created_at.strftime('%b %d, %Y %I:%M %p') }}</p>
    <div class="mb-4">{{ post.content | replace('\n', '<br>') | safe }}</div>
    <div class="d-flex gap-2">
      <a href="{{ url_for('edit_post', post_id=post.id) }}" class="btn btn-outline-primary">Edit</a>
      <form method="post" action="{{ url_for('delete_post', post_id=post.id) }}" style="display:inline;">
        <button type="submit" class="btn btn-outline-danger">Delete</button>
      </form>
      <a href="{{ url_for('index') }}" class="btn btn-secondary">Back</a>
    </div>
  </article>
{% endblock %}
