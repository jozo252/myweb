{% extends 'base.html' %}

{% block title %}Edit Post - Casual Flask App{% endblock %}

{% block content %}
  <h1>Edit Post</h1>
  <form method="post">
    <div class="mb-3">
      <label for="title" class="form-label">Title</label>
      <input type="text" class="form-control" id="title" name="title" value="{{ post.title }}" required>
    </div>
    <div class="mb-3">
      <label for="content" class="form-label">Content</label>
      <textarea class="form-control" id="content" name="content" rows="6" required>{{ post.content }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary">Save changes</button>
    <a href="{{ url_for('post_detail', post_id=post.id) }}" class="btn btn-secondary">Cancel</a>
  </form>
{% endblock %}
